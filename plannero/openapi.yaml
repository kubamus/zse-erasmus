        description:
          type: string
          maxLength: 2000
          nullable: true
        visibility:
          $ref: '#/components/schemas/BoardVisibility'
        color:
          type: string
          pattern: '^#([A-Fa-f0-9]{6})$'
          nullable: true
        archived:
          type: boolean
        createdBy: { $ref: '#/components/schemas/UUID' }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
      required:
        - id
        - workspaceId
        - name
        - key
        - description
        - visibility
        - color
        - archived
        - createdBy
        - createdAt
        - updatedAt

    BoardResponse:
      type: object
      properties:
