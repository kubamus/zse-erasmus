    UpdateLabelRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        color:
          type: string
          pattern: '^#([A-Fa-f0-9]{6})$'
      minProperties: 1

    # ---- Cards ----
    Card:
      type: object
      additionalProperties: false
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        boardId: { $ref: '#/components/schemas/UUID' }
        listId: { $ref: '#/components/schemas/UUID' }
        title:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          maxLength: 10000
          nullable: true
        position:
          type: number
          format: float
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        priority:
          $ref: '#/components/schemas/CardPriority'
        archived:
          type: boolean
        completed:
          type: boolean
        assigneeIds:
          type: array
          items:
            $ref: '#/components/schemas/UUID'
        labelIds:
          type: array
          items:
            $ref: '#/components/schemas/UUID'
        attachmentCount:
          type: integer
          minimum: 0
        checklistProgress:
          type: object
          additionalProperties: false
          properties:
            total:
              type: integer
              minimum: 0
            done:
              type: integer
              minimum: 0
          required: [total, done]
        createdBy: { $ref: '#/components/schemas/UUID' }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
      required:
        - id
        - boardId
        - listId
        - title
        - description
        - position
        - dueDate
        - startDate
        - priority
        - archived
        - completed
        - assigneeIds
        - labelIds
        - attachmentCount
        - checklistProgress
        - createdBy
        - createdAt
        - updatedAt

    CardResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Card'
      required: [data]

    CardListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Card'
      required: [data]

    CreateCardRequest:
      type: object
      additionalProperties: false
