        title:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          maxLength: 10000
        dueDate:
          type: string
          format: date-time
        startDate:
          type: string
          format: date-time
        priority:
          $ref: '#/components/schemas/CardPriority'
        assigneeIds:
          type: array
          items:
            $ref: '#/components/schemas/UUID'
        labelIds:
          type: array
          items:
            $ref: '#/components/schemas/UUID'
        position:
          type: number
          format: float
      required: [title]

    UpdateCardRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 300
        description:
          type: string
          maxLength: 10000
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        priority:
          $ref: '#/components/schemas/CardPriority'
        completed:
          type: boolean
        archived:
          type: boolean
      minProperties: 1

    MoveCardRequest:
