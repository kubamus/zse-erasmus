        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 1000
      minProperties: 1

    # ---- Boards ----
    Board:
      type: object
      additionalProperties: false
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        workspaceId: { $ref: '#/components/schemas/UUID' }
        name:
          type: string
          minLength: 1
          maxLength: 120
        key:
          type: string
          pattern: '^[A-Z][A-Z0-9_]{1,9}$'
          nullable: true
