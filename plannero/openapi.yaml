components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    workspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    boardId:
      name: boardId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    listId:
      name: listId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    cardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    labelId:
      name: labelId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    checklistItemId:
      name: checklistItemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    membershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    attachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    cursorParam:
      name: cursor
      in: query
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            badRequest:
              value:
                error:
                  code: BAD_REQUEST
                  message: Request validation failed.
                  details:
                    - field: email
                      reason: Invalid format.
                requestId: "3ccf4f7f-5a0a-4a6d-9f6d-50f7fd77cb9f"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            unauthorized:
              value:
                error:
                  code: UNAUTHORIZED
                  message: Missing or invalid authentication token.
                requestId: "10a4d8bc-d68f-4a3a-9d6e-65f81f9b18cb"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            forbidden:
              value:
                error:
                  code: FORBIDDEN
                  message: You do not have permission to perform this action.
                requestId: "f1a379d8-e4cc-46d5-af7d-fb8ec6d70f79"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            notFound:
              value:
                error:
                  code: NOT_FOUND
                  message: Resource not found.
                requestId: "7419f3f3-3890-4489-af20-5079a9f13e20"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            conflict:
              value:
                error:
                  code: CONFLICT
                  message: The resource is in a conflicting state.
                requestId: "bc3b83a7-f8fb-44bc-a25f-a39f16dd7a77"
    PayloadTooLarge:
      description: Payload too large
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            tooLarge:
              value:
                error:
                  code: PAYLOAD_TOO_LARGE
                  message: Payload exceeds allowed size.
                requestId: "f8147e2e-90c2-43ea-a007-c6f5f32fbb91"
    UnsupportedMediaType:
      description: Unsupported media type
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            unsupportedMediaType:
              value:
                error:
                  code: UNSUPPORTED_MEDIA_TYPE
                  message: Content type is not supported.
                requestId: "1719a63f-82ed-4558-879f-1a6c1bfddb53"
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            unprocessable:
              value:
                error:
                  code: UNPROCESSABLE_ENTITY
                  message: One or more fields are invalid.
                  details:
                    - field: password
                      reason: Must contain at least one special character.
                requestId: "e856e4f6-2cf8-40f0-b993-cc1fa57f0a08"
    TooManyRequests:
      description: Too many requests
      headers:
        Retry-After:
          schema:
            type: integer
          description: Number of seconds to wait before retrying.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            rateLimited:
              value:
                error:
                  code: TOO_MANY_REQUESTS
                  message: Rate limit exceeded.
                requestId: "8eb3f1ca-bdb2-4c54-a489-d24316b8f0da"
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            internal:
              value:
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: Unexpected server error.
                requestId: "21434d16-13a7-4f06-b5de-f7427bcebc3f"
    ServiceUnavailable:
      description: Service unavailable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            unavailable:
              value:
                error:
                  code: SERVICE_UNAVAILABLE
                  message: Service temporarily unavailable.
                requestId: "c5613dde-5379-447a-a53b-a23284c9f9e9"

  schemas:
    # ---- Core primitives ----
    UUID:
      type: string
      format: uuid

    Timestamp:
      type: string
      format: date-time

    ErrorFieldDetail:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
        reason:
          type: string
      required: [field, reason]

    ErrorBody:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
          examples: [BAD_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, CONFLICT, INTERNAL_SERVER_ERROR]
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorFieldDetail'
      required: [code, message]

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'
        requestId:
          type: string
      required: [error, requestId]

    MessageResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
      required: [message]

    AcceptedMessageResponse:
      type: object
      additionalProperties: false
      properties:
        message:
          type: string
        accepted:
          type: boolean
          const: true
      required: [message, accepted]

    HealthResponse:
      type: object
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
        timestamp:
          $ref: '#/components/schemas/Timestamp'
        version:
          type: string
      required: [status, timestamp, version]

    PaginationMeta:
      type: object
      additionalProperties: false
      properties:
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
      required: [nextCursor, hasMore]

    # ---- Enums ----
    Theme:
      type: string
      enum: [light, dark, system]

    Locale:
      type: string
      examples: [en-US, en-GB, de-DE]

    DateFormat:
      type: string
      enum: [YYYY-MM-DD, DD-MM-YYYY, MM-DD-YYYY]

    TimeFormat:
      type: string
      enum: [h12, h24]

    BoardVisibility:
      type: string
      enum: [private, workspace, public]

    WorkspaceRole:
      type: string
      enum: [owner, admin, member]

    BoardRole:
      type: string
      enum: [admin, member, observer]

    CardPriority:
      type: string
      enum: [low, medium, high, urgent]

    ActivityAction:
      type: string
      enum:
        - workspace.created
        - workspace.updated
        - board.created
        - board.updated
        - list.created
        - list.updated
        - card.created
        - card.updated
        - card.moved
        - card.archived
        - label.created
        - checklist.created
        - checklist.updated
        - attachment.created
        - membership.added
        - membership.updated
        - membership.removed

    # ---- Auth ----
    RegisterRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 128
        fullName:
          type: string
          minLength: 1
          maxLength: 120
      required: [email, password, fullName]

    LoginRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 128
      required: [email, password]

    RefreshTokenRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
          minLength: 20
      required: [refreshToken]

    LogoutRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
          minLength: 20

    ForgotPasswordRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
      required: [email]

    ResetPasswordRequest:
      type: object
      additionalProperties: false
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
          maxLength: 128
      required: [token, newPassword]

    AuthTokenPayload:
      type: object
      additionalProperties: false
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        expiresIn:
          type: integer
          description: Access token expiry in seconds
          minimum: 1
      required: [accessToken, refreshToken, tokenType, expiresIn]

    AuthTokensResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/AuthTokenPayload'
      required: [data]

    # ---- User / Settings ----
    User:
      type: object
      additionalProperties: false
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        email:
          type: string
          format: email
        fullName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        timezone:
          type: string
          examples: [UTC, America/New_York]
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [id, email, fullName, avatarUrl, timezone, createdAt, updatedAt]

    UserResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/User'
      required: [data]

    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        fullName:
          type: string
          minLength: 1
          maxLength: 120
        timezone:
          type: string
          maxLength: 64
      minProperties: 1

    UpdateAvatarRequest:
      type: object
      additionalProperties: false
      properties:
        avatarUrl:
          type: string
          format: uri
      required: [avatarUrl]

    UserSettings:
      type: object
      additionalProperties: false
      properties:
        userId: { $ref: '#/components/schemas/UUID' }
        theme: { $ref: '#/components/schemas/Theme' }
        locale: { $ref: '#/components/schemas/Locale' }
        dateFormat: { $ref: '#/components/schemas/DateFormat' }
        timeFormat: { $ref: '#/components/schemas/TimeFormat' }
        emailNotifications:
          type: boolean
        pushNotifications:
          type: boolean
        compactMode:
          type: boolean
        startOfWeek:
          type: string
          enum: [monday, sunday]
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
      required:
        - userId
        - theme
        - locale
        - dateFormat
        - timeFormat
        - emailNotifications
        - pushNotifications
        - compactMode
        - startOfWeek
        - updatedAt

    UserSettingsResponse:
      type: object
      additionalProperties: false
      properties:
        data:
          $ref: '#/components/schemas/UserSettings'
      required: [data]

    UpdateUserSettingsRequest:
      type: object
      additionalProperties: false
      properties:
        theme: { $ref: '#/components/schemas/Theme' }
        locale: { $ref: '#/components/schemas/Locale' }
        dateFormat: { $ref: '#/components/schemas/DateFormat' }
        timeFormat: { $ref: '#/components/schemas/TimeFormat' }
        emailNotifications:
          type: boolean
        pushNotifications:
          type: boolean
        compactMode:
          type: boolean
        startOfWeek:
          type: string
          enum: [monday, sunday]
      minProperties: 1

    # ---- Workspace ----
    Workspace:
      type: object
      additionalProperties: false
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9-]{3,50}$'
        description:
          type: string
          maxLength: 1000
          nullable: true
        createdBy: { $ref: '#/components/schemas/UUID' }
        createdAt: { $ref: '#/components/schemas/Timestamp' }
        updatedAt: { $ref: '#/components/schemas/Timestamp' }
      required: [id, name, slug, description, createdBy, createdAt, updatedAt]

    WorkspaceResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Workspace'
      required: [data]

    PaginatedWorkspaceResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Workspace'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [data, meta]

    CreateWorkspaceRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9-]{3,50}$'
        description:
          type: string
          maxLength: 1000
      required: [name, slug]

    UpdateWorkspaceRequest:
      type: object
      additionalProperties: false
