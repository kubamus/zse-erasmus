          items:
            $ref: '#/components/schemas/Attachment'
      required: [data]

    CreateAttachmentRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        url:
          type: string
          format: uri
        mimeType:
          type: string
          maxLength: 150
        sizeBytes:
          type: integer
          minimum: 0
      required: [name, url, mimeType, sizeBytes]

