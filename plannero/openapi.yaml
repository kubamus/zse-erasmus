openapi: 3.1.0
info:
  title: Plannero Task Management API
  version: 0.1.0
  summary: Simple Trello/Jira-like API for workspaces, projects, boards, and issues.
  description: |
    This API specification covers the domain resources for a lightweight project/task
    management system. Authentication resources (user/account/session/verification) are
    managed separately by the auth module.
servers:
  - url: /api
    description: Relative API base URL
tags:
  - name: Workspaces
  - name: Members
  - name: Projects
  - name: Boards
  - name: Columns
  - name: Labels
  - name: Issues
  - name: Comments
  - name: Activity
security:
  - bearerAuth: []
paths:
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces visible to the current user
      operationId: listWorkspaces
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Workspaces]
      summary: Create workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /workspaces/{workspaceId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Workspaces]
      summary: Get workspace by id
      operationId: getWorkspace
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Workspaces]
      summary: Update workspace
      operationId: updateWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Workspaces]
      summary: Archive workspace
      operationId: deleteWorkspace
      responses:
        "204":
          description: Workspace archived
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/members:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Members]
      summary: List workspace members
      operationId: listWorkspaceMembers
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Members]
      summary: Add workspace member by email
      operationId: addWorkspaceMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /workspaces/{workspaceId}/members/{userId}:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags: [Members]
      summary: Update member role
      operationId: updateWorkspaceMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceMemberRequest"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceMember"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Members]
      summary: Remove workspace member
      operationId: removeWorkspaceMember
      responses:
        "204":
          description: Member removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /workspaces/{workspaceId}/projects:
    parameters:
      - $ref: "#/components/parameters/WorkspaceId"
    get:
      tags: [Projects]
      summary: List workspace projects
      operationId: listProjects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Projects]
      summary: Get project by id
      operationId: getProject
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: Update project
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Projects]
      summary: Archive project
      operationId: deleteProject
      responses:
        "204":
          description: Project archived
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/boards:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Boards]
      summary: List boards in project
      operationId: listBoards
      responses:
        "200":
          description: Board list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Board"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Boards]
      summary: Create board
      operationId: createBoard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoardRequest"
      responses:
        "201":
          description: Board created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /boards/{boardId}:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Boards]
      summary: Get board by id
      operationId: getBoard
      responses:
        "200":
          description: Board details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Boards]
      summary: Update board
      operationId: updateBoard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoardRequest"
      responses:
        "200":
          description: Board updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Board"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Boards]
      summary: Archive board
      operationId: deleteBoard
      responses:
        "204":
          description: Board archived
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /boards/{boardId}/columns:
    parameters:
      - $ref: "#/components/parameters/BoardId"
    get:
      tags: [Columns]
      summary: List board columns
      operationId: listBoardColumns
      responses:
        "200":
          description: Column list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoardColumn"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Columns]
      summary: Create board column
      operationId: createBoardColumn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBoardColumnRequest"
      responses:
        "201":
          description: Column created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardColumn"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /columns/{columnId}:
    parameters:
      - $ref: "#/components/parameters/ColumnId"
    patch:
      tags: [Columns]
      summary: Update board column
      operationId: updateBoardColumn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBoardColumnRequest"
      responses:
        "200":
          description: Column updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoardColumn"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Columns]
      summary: Delete board column
      operationId: deleteBoardColumn
      responses:
        "204":
          description: Column deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/labels:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Labels]
      summary: List project labels
      operationId: listLabels
      responses:
        "200":
          description: Label list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Labels]
      summary: Create label
      operationId: createLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLabelRequest"
      responses:
        "201":
          description: Label created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /labels/{labelId}:
    parameters:
      - $ref: "#/components/parameters/LabelId"
    patch:
      tags: [Labels]
      summary: Update label
      operationId: updateLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Label updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Labels]
      summary: Delete label
      operationId: deleteLabel
      responses:
        "204":
          description: Label deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/issues:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Issues]
      summary: List issues in project
      operationId: listIssues
      parameters:
        - in: query
          name: boardId
          schema:
            type: string
            format: uuid
        - in: query
          name: columnId
          schema:
            type: string
            format: uuid
        - in: query
          name: assigneeId
          schema:
            type: string
            format: uuid
        - in: query
          name: labelId
          schema:
            type: string
            format: uuid
        - in: query
          name: priority
          schema:
            $ref: "#/components/schemas/IssuePriority"
        - in: query
          name: type
          schema:
            $ref: "#/components/schemas/IssueType"
        - in: query
          name: q
          description: Search term on title/description
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - in: query
          name: cursor
          description: Opaque cursor for pagination
          schema:
            type: string
      responses:
        "200":
          description: Issue page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIssues"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Issues]
      summary: Create issue
      operationId: createIssue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssueRequest"
      responses:
        "201":
          description: Issue created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /issues/{issueId}:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    get:
      tags: [Issues]
      summary: Get issue by id
      operationId: getIssue
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Issues]
      summary: Update issue
      operationId: updateIssue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIssueRequest"
      responses:
        "200":
          description: Issue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Issues]
      summary: Soft delete issue
      operationId: deleteIssue
      responses:
        "204":
          description: Issue soft-deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/move:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    post:
      tags: [Issues]
      summary: Move issue to another column/position
      operationId: moveIssue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveIssueRequest"
      responses:
        "200":
          description: Issue moved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/assignees:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    get:
      tags: [Issues]
      summary: List assignees for issue
      operationId: listIssueAssignees
      responses:
        "200":
          description: Assignee list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Issues]
      summary: Assign user to issue
      operationId: assignIssue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignIssueRequest"
      responses:
        "201":
          description: Assignee added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRef"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/assignees/{userId}:
    parameters:
      - $ref: "#/components/parameters/IssueId"
      - $ref: "#/components/parameters/UserId"
    delete:
      tags: [Issues]
      summary: Unassign user from issue
      operationId: unassignIssue
      responses:
        "204":
          description: Assignee removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/labels:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    get:
      tags: [Issues]
      summary: List labels for issue
      operationId: listIssueLabels
      responses:
        "200":
          description: Label list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Label"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Issues]
      summary: Attach label to issue
      operationId: addIssueLabel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueLabelRequest"
      responses:
        "201":
          description: Label attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/labels/{labelId}:
    parameters:
      - $ref: "#/components/parameters/IssueId"
      - $ref: "#/components/parameters/LabelId"
    delete:
      tags: [Issues]
      summary: Remove label from issue
      operationId: removeIssueLabel
      responses:
        "204":
          description: Label detached
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/comments:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    get:
      tags: [Comments]
      summary: List comments on issue
      operationId: listIssueComments
      responses:
        "200":
          description: Comment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Comments]
      summary: Create comment on issue
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /comments/{commentId}:
    parameters:
      - $ref: "#/components/parameters/CommentId"
    patch:
      tags: [Comments]
      summary: Update comment
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Comments]
      summary: Soft delete comment
      operationId: deleteComment
      responses:
        "204":
          description: Comment soft-deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /issues/{issueId}/activity:
    parameters:
      - $ref: "#/components/parameters/IssueId"
    get:
      tags: [Activity]
      summary: List activity events for issue
      operationId: listIssueActivity
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        "200":
          description: Activity page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedActivity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WorkspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        format: uuid
    ProjectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
        format: uuid
    BoardId:
      in: path
      name: boardId
      required: true
      schema:
        type: string
        format: uuid
    ColumnId:
      in: path
      name: columnId
      required: true
      schema:
        type: string
        format: uuid
    IssueId:
      in: path
      name: issueId
      required: true
      schema:
        type: string
        format: uuid
    CommentId:
      in: path
      name: commentId
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    LabelId:
      in: path
      name: labelId
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid auth
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
          example: Resource not found
      required: [code, message]

    WorkspaceRole:
      type: string
      enum: [owner, admin, member]

    BoardType:
      type: string
      enum: [kanban, scrum]

    IssueType:
      type: string
      enum: [task, bug, story, chore]

    IssuePriority:
      type: string
      enum: [low, medium, high, critical]

    UserRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        image:
          type: string
          nullable: true
      required: [id, name, email]

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, slug, createdAt, updatedAt]

    WorkspaceMember:
      type: object
      properties:
        workspaceId:
          type: string
          format: uuid
        user:
          $ref: "#/components/schemas/UserRef"
        role:
          $ref: "#/components/schemas/WorkspaceRole"
        joinedAt:
          type: string
          format: date-time
      required: [workspaceId, user, role, joinedAt]

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        key:
          type: string
          example: APP
        name:
          type: string
        description:
          type: string
          nullable: true
        isArchived:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, workspaceId, key, name, isArchived, createdAt, updatedAt]

    Board:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        type:
          $ref: "#/components/schemas/BoardType"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, projectId, name, type, createdAt, updatedAt]

    BoardColumn:
      type: object
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        name:
          type: string
        position:
          type: number
          description: Numeric position used for drag-and-drop ordering.
          example: 2000
        wipLimit:
          type: integer
          nullable: true
        isDoneColumn:
          type: boolean
          default: false
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        [id, boardId, name, position, isDoneColumn, createdAt, updatedAt]

    Label:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
          example: "#F97316"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, projectId, name, color, createdAt, updatedAt]

    Issue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        columnId:
          type: string
          format: uuid
        issueNumber:
          type: integer
          minimum: 1
          description: Per-project human friendly issue number.
        title:
          type: string
        description:
          type: string
          nullable: true
          description: Markdown content.
        type:
          $ref: "#/components/schemas/IssueType"
        priority:
          $ref: "#/components/schemas/IssuePriority"
        reporter:
          $ref: "#/components/schemas/UserRef"
        dueDate:
          type: string
          format: date-time
          nullable: true
        estimatePoints:
          type: number
          nullable: true
        position:
          type: number
          description: Numeric position inside the current column.
        assignees:
          type: array
          items:
            $ref: "#/components/schemas/UserRef"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - projectId
        - boardId
        - columnId
        - issueNumber
        - title
        - type
        - priority
        - reporter
        - position
        - assignees
        - labels
        - createdAt
        - updatedAt

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        issueId:
          type: string
          format: uuid
        author:
          $ref: "#/components/schemas/UserRef"
        body:
          type: string
          description: Markdown content.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, issueId, author, body, createdAt, updatedAt]

    ActivityEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        issueId:
          type: string
          format: uuid
        actor:
          $ref: "#/components/schemas/UserRef"
        eventType:
          type: string
          example: issue.moved
        oldValue:
          type: object
          additionalProperties: true
          nullable: true
        newValue:
          type: object
          additionalProperties: true
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, issueId, actor, eventType, createdAt]

    CursorPageMeta:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
      required: [nextCursor]

    PaginatedIssues:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        meta:
          $ref: "#/components/schemas/CursorPageMeta"
      required: [data, meta]

    PaginatedActivity:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
        meta:
          $ref: "#/components/schemas/CursorPageMeta"
      required: [data, meta]

    CreateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80
      required: [name]

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 80

    CreateWorkspaceMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/WorkspaceRole"
      required: [email, role]

    UpdateWorkspaceMemberRequest:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/WorkspaceRole"
      required: [role]

    CreateProjectRequest:
      type: object
      properties:
        key:
          type: string
          minLength: 2
          maxLength: 10
          pattern: "^[A-Z][A-Z0-9_]*$"
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
      required: [key, name]

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        description:
          type: string
        isArchived:
          type: boolean

    CreateBoardRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        type:
          $ref: "#/components/schemas/BoardType"
      required: [name, type]

    UpdateBoardRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        type:
          $ref: "#/components/schemas/BoardType"

    CreateBoardColumnRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        position:
          type: number
        wipLimit:
          type: integer
          minimum: 1
          nullable: true
        isDoneColumn:
          type: boolean
          default: false
      required: [name, position]

    UpdateBoardColumnRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        position:
          type: number
        wipLimit:
          type: integer
          minimum: 1
          nullable: true
        isDoneColumn:
          type: boolean

    CreateLabelRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
      required: [name, color]

    UpdateLabelRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 40
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"

    CreateIssueRequest:
      type: object
      properties:
        boardId:
          type: string
          format: uuid
        columnId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
        type:
          $ref: "#/components/schemas/IssueType"
        priority:
          $ref: "#/components/schemas/IssuePriority"
        dueDate:
          type: string
          format: date-time
          nullable: true
        estimatePoints:
          type: number
          nullable: true
        assigneeIds:
          type: array
          items:
            type: string
            format: uuid
        labelIds:
          type: array
          items:
            type: string
            format: uuid
      required: [boardId, columnId, title, type, priority]

    UpdateIssueRequest:
      type: object
      properties:
        columnId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
        type:
          $ref: "#/components/schemas/IssueType"
        priority:
          $ref: "#/components/schemas/IssuePriority"
        dueDate:
          type: string
          format: date-time
          nullable: true
        estimatePoints:
          type: number
          nullable: true
        position:
          type: number

    MoveIssueRequest:
      type: object
      properties:
        toColumnId:
          type: string
          format: uuid
        position:
          type: number
      required: [toColumnId, position]

    AssignIssueRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
      required: [userId]

    IssueLabelRequest:
      type: object
      properties:
        labelId:
          type: string
          format: uuid
      required: [labelId]

    CreateCommentRequest:
      type: object
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
      required: [body]

    UpdateCommentRequest:
      type: object
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 10000
      required: [body]
