<!doctype html>
<html lang="pl-PL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      html {
        color-scheme: dark;
      }
      body {
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        font-family: sans-serif;
        background-color: #282828;
        color: #ffffff;
      }
      h1 {
        font-size: 3em;
        font-weight: 800;
        color: #ffd700;
        text-shadow: 2px 2px 4px #000000;
        animation: glow 1.5s ease-in-out infinite alternate;
      }
      p {
        font-size: 1.2em;
        line-height: 1.5;
        animation: appear 1s ease-out;
      }

      @keyframes appear {
        0% {
          opacity: 0;
          transform: translateY(20px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes glow {
        0% {
          text-shadow:
            2px 2px 4px #000000,
            0 0 10px #ffd700;
        }
        100% {
          text-shadow:
            2px 2px 10px #ffd700,
            0 0 20px #ffd700;
        }
      }
    </style>
  </head>
  <body>
    <h1>Kuba Musielski</h1>
    <p>
      Hello! My name is Kuba. I am student at ZSE Żary, currently in my third
      year.
    </p>
  </body>
</html>
