<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona Mikołaja</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #2d3436;
            margin-bottom: 10px;
        }
        p {
            color: #636e72;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #74b9ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Cześć, jestem Mikołaj! 👋</h1>
        <p>Wpadłeś na moją szybką stronę. Interesuję się nowymi technologiami i szybkim działaniem.</p>
        <p><i>"Pierwszy milion trzeba ukraść."</i></p>
        <a href="#" class="btn" onclick="alert('Dzięki za kliknięcie!')">Kliknij mnie!</a>
    </div>

</body>
</html>
